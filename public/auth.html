<!DOCTYPE html>
<html>
<head><title>Authenticating...</title></head>
<body>
    <script src="https://alcdn.msauth.net/browser/3.7.0/js/msal-browser.min.js"></script>
    <script>
        const msalInstance = new msal.PublicClientApplication({
            auth: {
                clientId: "9982e25d-66bc-41fa-b62b-2e73f6a96ea0",
                authority: "https://login.microsoftonline.com/fcd6a9af-1cde-4b3b-84bc-2eb80e1a40d9"
            }
        });

        msalInstance.initialize().then(() => {
            msalInstance.handleRedirectPromise().then(() => {
                // This sends the user back to the main HRIS screen
                window.location.href = "http://localhost:5173";
            });
        });
    </script>
</body>
</html>
